name: Continuous Integration

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --workspaces --sequential build

      - name: Lint code
        run: bun run lint

      - name: Format check
        run: bun run format

      - name: Run tests with coverage
        run: bunx vitest run --coverage

      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          json-summary-path: "./test-results/coverage/coverage-summary.json"
          json-final-path: "./test-results/coverage/coverage-final.json"
