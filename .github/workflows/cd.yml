name: Continuous Deployment

# NOTE: Not yet enabled. Uncomment the push trigger and remove workflow_dispatch to enable.
# Also ensure the NPM_TOKEN secret is configured in the repository settings.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "packages/*/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build
        run: bun run build

      # - name: Run build and linters
      #   run: bun run build:ci

      # - name: Run tests
      #   run: bun run test:ci

      - name: Pack packages
        run: bun run release:pack

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish packages to NPM
        run: |
          for tarball in *.tgz; do
            if [ ! -f "$tarball" ]; then
              continue
            fi

            echo "Publishing $tarball..."
            if ! output=$(npm publish "$tarball" --access public 2>&1); then
              echo "::warning::Failed to publish $tarball: $output"
            fi
          done
