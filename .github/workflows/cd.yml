name: Continuous Deployment

# NOTE: Not yet enabled. Uncomment the push trigger and remove workflow_dispatch to enable.
# Also ensure the NPM_TOKEN secret is configured in the repository settings.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "packages/*/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build and linters
        run: bun run build:ci

      - name: Run tests
        run: bun run test:ci

      - name: Publish changed packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            PKG_JSON="${dir}package.json"
            if [ ! -f "$PKG_JSON" ]; then continue; fi

            PRIVATE=$(node -p "require('./${PKG_JSON}').private || false")
            if [ "$PRIVATE" = "true" ]; then continue; fi

            NAME=$(node -p "require('./${PKG_JSON}').name")
            LOCAL_VERSION=$(node -p "require('./${PKG_JSON}').version")
            PUBLISHED_VERSION=$(npm view "$NAME" version 2>/dev/null || echo "")

            if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
              echo "⏭️  $NAME@$LOCAL_VERSION already published"
            else
              echo "📦 Publishing $NAME@$LOCAL_VERSION (was ${PUBLISHED_VERSION:-unpublished})..."
              (cd "$dir" && npm publish --access public --provenance)
            fi
          done
