name: Continuous Deployment

# NOTE: Not yet enabled. Uncomment the push trigger and remove workflow_dispatch to enable.
# Also ensure the NPM_TOKEN secret is configured in the repository settings.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "packages/*/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "22"
      #     registry-url: "https://registry.npmjs.org"

      # - name: Setup Bun cache
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.bun/install/cache
      #     key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}
      #     restore-keys: |
      #       ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build and linters
        run: bun run build:ci

      - name: Run tests
        run: bun run test:ci

      - name: Publish changed packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release
