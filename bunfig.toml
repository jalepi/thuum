[test]
preload = ["./test-preload.ts"]
coverageDir = "./test-results/coverage"
coverageThreshold = { lines = 0.8, functions = 0.8, statements = 0.8 }
coverageReporter = ["text", "lcov"]
coverageIgnoreSourcemaps = false
coveragePathIgnorePatterns = [
  "**/dist/**",
  "**/node_modules/**",
  "**/__fixtures__/**",
  "test-preload.ts",
  "test-helpers.ts"
]
